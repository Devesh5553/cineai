<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CineAI - AI-powered movie recommendations" />
    <title>CineAI — Discover Your Next Favorite Film</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <script>
      try {
        var s = JSON.parse(localStorage.getItem('theme-store') || '{}')
        document.documentElement.classList.toggle('dark', s?.state?.isDark !== false)
      } catch(e) {
        document.documentElement.classList.add('dark')
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
